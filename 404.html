<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting…</title>
  <script>
    sessionStorage.setItem('gh_redirect', location.pathname + location.search + location.hash);
    location.replace(location.origin + '/?p=' + encodeURIComponent(location.pathname + location.search + location.hash));
  </script>
</head>
<body></body>
</html>
